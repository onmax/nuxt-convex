name: release

permissions:
  id-token: write
  contents: write
  actions: read

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm
        with:
          install-command: pnpm install --filter vue-convex... --filter nuxt-convex...
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm validate:packages

      - name: Determine npm tag
        id: npm-tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG" == *"-alpha"* ]]; then
            echo "tag=alpha" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-beta"* ]]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-rc"* ]]; then
            echo "tag=rc" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: GitHub Release
        run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish vue-convex
        run: pnpm --filter vue-convex publish --no-git-checks --provenance --access public --tag ${{ steps.npm-tag.outputs.tag }}

      - name: Publish nuxt-convex
        run: pnpm --filter nuxt-convex publish --no-git-checks --provenance --access public --tag ${{ steps.npm-tag.outputs.tag }}
