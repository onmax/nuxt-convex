name: playground-preview-cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: playground-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  delete:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - run: npm i -g --force corepack && corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Validate cleanup configuration
        run: |
          for key in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required preview cleanup configuration: ${key}"
              exit 1
            fi
          done

      - run: pnpm install

      - name: Delete preview worker
        run: |
          worker_name="nuxt-convex-playground-pr-${{ github.event.pull_request.number }}"
          pnpm --dir playground exec wrangler delete "${worker_name}" --force
