name: playground-preview-cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: playground-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  delete:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - run: npm i -g --force corepack && corepack enable

      - name: Detect cleanup configuration
        id: cleanup-config
        run: |
          missing_keys=""
          for key in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!key}" ]; then
              missing_keys="${missing_keys} ${key}"
            fi
          done

          if [ -n "${missing_keys}" ]; then
            message="Skipping preview cleanup: missing${missing_keys}"
            echo "::warning::${message}"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "message=${message}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v5
        if: steps.cleanup-config.outputs.enabled == 'true'
        with:
          node-version: 22
          cache: pnpm

      - if: steps.cleanup-config.outputs.enabled == 'true'
        run: pnpm install

      - name: Delete preview worker
        if: steps.cleanup-config.outputs.enabled == 'true'
        run: |
          worker_name="nuxt-convex-playground-pr-${{ github.event.pull_request.number }}"
          pnpm --dir playground exec wrangler delete "${worker_name}" --force

      - name: Publish skipped cleanup summary
        if: steps.cleanup-config.outputs.enabled != 'true'
        run: |
          {
            echo "## Playground Preview Cleanup"
            echo
            echo "${{ steps.cleanup-config.outputs.message }}"
          } >> "$GITHUB_STEP_SUMMARY"
