name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-pnpm
        with:
          install-command: pnpm install --filter vue-convex... --filter nuxt-convex...
      - run: pnpm exec eslint . --ignore-pattern docs
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  package-check:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-pnpm
        with:
          install-command: pnpm install --filter vue-convex... --filter nuxt-convex...
      - run: pnpm validate:packages
      - run: pnpm preview:packages
